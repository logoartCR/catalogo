<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo LogoArtCR</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; }
        #contenedor-catalogo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="contenedor-catalogo" src=""></iframe>

    <script>
        // 1. Detectamos si en la barra de direcciones hay un ID de producto
        const params = new URLSearchParams(window.location.search);
        const idProducto = params.get('id');
        
        // 2. PEGA AQUÍ TU URL DE GOOGLE (La que obtuviste en el Nuevo Despliegue)
        let urlGoogle = "https://script.google.com/macros/s/AKfycbxWB5ocpsnGBBHtlorsoBfieoyI_2wbjMgyZFnpv7zNYgm_dPMijYvUhGJA5lSuKie2/exec";
        
        // 3. Si hay un ID, se lo pegamos a la URL de Google para que sepa qué abrir
        if (idProducto) {
            // Usamos un conector (? o &) dependiendo de si la URL ya tiene parámetros
            const conector = urlGoogle.includes('?') ? '&' : '?';
            urlGoogle += conector + "id=" + encodeURIComponent(idProducto);
        }
        
        // 4. Le decimos al iframe que cargue esa dirección final
        document.getElementById('contenedor-catalogo').src = urlGoogle;
    </script>
</body>
</html>
