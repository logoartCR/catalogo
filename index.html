<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo de Productos</title>
    <style>
        /* Eliminamos margenes y fijamos el tamaño al 100% de la pantalla */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita que GitHub cree un segundo scroll */
            background-color: #f4f4f4; /* Color de fondo igual a tu app */
        }
        /* El iframe ocupa toda la pantalla de forma invisible */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

</body>
